<!--
  FlashCart — Brand Favicon SVG
  Lightning bolt in a shopping cart — represents fast delivery.
  Dark green (#1B5E20) brand color + bright green (#00C853) accent.
  Developer: Rizwan Rahim Chowdhury
  Powered by: Bangladesh Software Development Community
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 32 32"
  width="32"
  height="32"
  role="img"
  aria-label="FlashCart logo"
>
  <!-- Background circle — brand green -->
  <circle cx="16" cy="16" r="16" fill="#1B5E20"/>

  <!-- Cart body — white for contrast on green background -->
  <path
    d="M6 8h2l2.5 10h11L24 11H10"
    stroke="white"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Cart wheels -->
  <circle cx="13" cy="21" r="1.5" fill="white"/>
  <circle cx="20" cy="21" r="1.5" fill="white"/>

  <!-- Lightning bolt — the "Flash" in FlashCart -->
  <!-- Bright accent green for visual emphasis -->
  <path
    d="M17 9l-4 7h4l-3 7 8-9h-5l3-5z"
    fill="#00C853"
  />
</svg>
