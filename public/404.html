<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlashCart Partner — Redirecting...</title>
    <script>
      // Cloudflare Pages SPA routing: preserve deep-link, redirect to root.
      (function () {
        sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
        location.replace('/');
      })();
    </script>
  </head>
  <body><p>Redirecting...</p></body>
</html>
