  <!-- ================================================================== -->
  <!-- ONESIGNAL WEB PUSH SDK — PARTNER PORTAL ONLY                       -->
  <!-- ================================================================== -->
  <!-- 
    OneSignal is loaded ONLY in the partner portal for push notifications.
    The customer portal and docs portal do NOT include this script.
    
    Flow: 
    1. SDK loads and initializes with our App ID
    2. Partner grants notification permission
    3. OneSignal assigns a Player ID
    4. Player ID is saved to Firestore under partner's document
    5. When new order arrives, we call OneSignal REST API with that Player ID
    6. Partner receives push notification even when browser is closed
  -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <style>
    *, *::before, *::after {
      margin: 0;

    :root {
      --color-primary: #1B5E20;

    body {

      color: var(--color-text-primary);

      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      line-height: 1.6;

    }

    #root {

    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 50%, #388E3C 100%);
      color: var(--color-white);
      font-family: var(--font-english);
    }

    .app-loading__logo {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      animation: pulse-loading 1.5s ease-in-out infinite;
    }

    .app-loading__text {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .app-loading__badge {
      font-size: 12px;
      background: rgba(255,255,255,0.2);
      padding: 2px 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .app-loading__subtext {
      font-size: 14px;
      opacity: 0.8;
      font-family: var(--font-bangla);
    }

    .app-loading__spinner {
      width: 40px;
      height: 40px;
      margin-top: 32px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--color-white);
      border-radius: 50%;
      animation: spin-loading 0.8s linear infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    @keyframes spin-loading {
      to { transform: rotate(360deg); }
    }

    .skip-link {
      position: absolute;
      top: -100%;
      left: 16px;
      background: var(--color-primary);
      color: var(--color-white);
      padding: 8px 16px;
      border-radius: 0 0 4px 4px;
      z-index: 10000;
      font-size: 14px;
      text-decoration: none;
      transition: top 0.2s;
    }

    .skip-link:focus {
      top: 0;
    }
  </style>
